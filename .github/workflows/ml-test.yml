name: ML Model Validation

on:
  push:
    branches: [ main ]
    paths:
      - 'ml/**'
  pull_request:
    branches: [ main ]
    paths:
      - 'ml/**'

jobs:
  test-ml:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          
      - name: Install dependencies
        run: |
          cd ml
          pip install -r requirements.txt
          
      - name: Run training smoke test
        run: |
          cd ml
          python train.py --config configs/test_config.yaml --epochs 1
          
      - name: Quantize model
        run: |
          cd ml
          python quantize.py --input models/tiny_transformer.h5 --output models/tiny_transformer_int8.tflite
          
      - name: Check model size
        run: |
          cd ml
          SIZE=$(stat -c%s "models/tiny_transformer_int8.tflite")
          if [ $SIZE -gt 2000000 ]; then
            echo "Model too large: $SIZE bytes (max 2MB)"
            exit 1
          fi
          echo "Model size: $SIZE bytes ✓"
